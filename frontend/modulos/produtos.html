<!--
    Fragmento HTML para a Seção "Produtos"
    Carregado dinamicamente na #content-area do painel.
-->
<div class="table-card-container">
    <!-- Cabeçalho da Seção -->
    <div class="settings-header">
        <div>
            <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--brand-dark);">
                Gestão de Produtos
            </h2>
            <p style="color: var(--brand-muted); margin-top: 4px;">
                Adicione, edite ou remova os itens do seu catálogo.
            </p>
        </div>
        <button id="add-product-btn" class="btn-primary-custom">
            <i data-lucide="plus-circle" class="w-4 h-4"></i>
            Novo Produto
        </button>
    </div>

    <!-- Tabela de Produtos -->
    <div id="products-list-container" style="margin-top: 24px;">
        <!-- Os produtos serão renderizados aqui via JS -->
        <p id="products-loading-feedback">Carregando produtos...</p>
    </div>
</div>

<!--
    Modal para Adicionar/Editar Produto (inicialmente oculto)
-->
<div id="product-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h2 id="modal-title">Novo Produto</h2>

        <form id="product-form">
            <!-- ID oculto para edição -->
            <input type="hidden" id="product_id" name="product_id">

            <!-- Título do Produto -->
            <div class="form-group">
                <label for="title">Nome do Produto</label>
                <input type="text" id="title" name="title" placeholder="Ex: Camiseta Branca" required>
            </div>

            <!-- Preço -->
            <div class="form-group">
                <label for="price">Preço (R$)</label>
                <input type="number" id="price" name="price" step="0.01" placeholder="Ex: 49.90" required>
            </div>

            <!-- Descrição do Produto -->
            <div class="form-group">
                <label for="description">Descrição do Produto (Opcional)</label>
                <textarea id="description" name="description" rows="3"
                    placeholder="Detalhes sobre o material, dimensões, etc."></textarea>
            </div>

            <!-- URL da Imagem -->
            <div class="form-group">
                <label for="image_file">Imagem do Produto</label>
                <input type="file" id="image_file" name="image_file" accept="image/png, image/jpeg, image/webp">
                <img id="image-preview" src="" alt="Pré-visualização da imagem"
                    style="max-width: 100px; border-radius: 4px; margin-top: 10px; display: none; object-fit: cover;">
                <!-- Campo oculto para armazenar a URL final da imagem -->
                <input type="hidden" id="image_url" name="image_url">
            </div>

            <!-- Variações do Produto -->
            <div class="form-group">
                <label>Variações (Cores, Tamanhos, etc.)</label>
                <div id="variations-container" style="display: flex; flex-direction: column; gap: 8px;">
                    <!-- Linhas de variação serão injetadas aqui via JS -->
                </div>
                <button type="button" id="add-variation-btn" class="button-secondary"
                    style="margin-top: 12px; padding: 6px 12px;">
                    <i data-lucide="plus" style="width: 16px; height: 16px; margin-right: 4px;"></i> Adicionar Variação
                </button>
            </div>

            <!-- Feedback e Ações -->
            <div class="modal-actions" style="justify-content: space-between; align-items: center;">
                <div id="product-feedback" style="font-size: 0.875rem; font-weight: 500;"></div>
                <div>
                    <button type="button" id="cancel-product-btn" class="button-secondary">
                        Cancelar
                    </button>
                    <button type="submit" id="save-product-button" class="button-primary">
                        Salvar
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
